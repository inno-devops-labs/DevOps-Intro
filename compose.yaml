services:
  quicknotes:
    image: quicknotes:lab6
    build:
      context: ./app
    user: "0:0"

    ports:
      - "8080:8080"

    environment:
      ADDR: ":8080"
      DATA_PATH: "/data/notes.json"
      SEED_PATH: "/seed.json"

    volumes:
      - quicknotes-data:/data

    restart: unless-stopped

volumes:
  quicknotes-data: