services:
  quicknotes:
    build: ./app
    image: quicknotes:lab6
    ports:
      # host port defaults to 8080; override with QN_HOST_PORT if 8080 is taken
      - "${QN_HOST_PORT:-8080}:8080"
    environment:
      ADDR: ":8080"
      DATA_PATH: "/data/notes.json"
      SEED_PATH: "/seed.json"
    volumes:
      - quicknotes-data:/data        # named volume: survives `down`, dies on `down -v`
    healthcheck:
      test: ["CMD", "/healthcheck"]   # distroless has no shell, so we ship a probe binary
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

    # ---- Bonus: the 6 security defaults ----
    # 1. USER nonroot          -> set in the Dockerfile (UID 65532)
    # 2. distroless base       -> set in the Dockerfile (no shell / no pkg manager)
    # 3. drop all capabilities -> QuickNotes needs none
    cap_drop:
      - ALL
    # 4. read-only root fs, with tmpfs for the only writable scratch path
    read_only: true
    tmpfs:
      - /tmp
    # 5. no privilege escalation
    security_opt:
      - no-new-privileges:true

  # ---- Lab 8: observability stack ----
  prometheus:
    image: prom/prometheus:v3.5.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      quicknotes:
        condition: service_healthy   # Lab 6 healthcheck gates the scrape target
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.0
    environment:
      # never ship default creds; override GF_ADMIN_PASSWORD in your shell/.env
      GF_SECURITY_ADMIN_USER: "${GF_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-changeme-lab8}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  quicknotes-data:
