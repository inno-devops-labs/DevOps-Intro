name: quicknotes

services:
  quicknotes:
    build: ./app
    image: quicknotes:lab6
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_PATH: /data/notes.json
      SEED_PATH: /seed.json
    volumes:
      - quicknotes-data:/data          # named volume — survives `down`, dies on `down -v`
    healthcheck:
      test: ["CMD", "/healthcheck"]      # distroless has no shell — use the baked-in probe
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s
    restart: unless-stopped

    # ---- Bonus: the 6 hardening defaults ----
    # (1) USER nonroot and (2) distroless base come from the Dockerfile.
    read_only: true                      # (4) read-only root filesystem
    tmpfs:
      - /tmp                             #     ...with a writable tmpfs for scratch
    cap_drop:
      - ALL                              # (3) drop every Linux capability
    security_opt:
      - no-new-privileges:true           # (5) no privilege escalation

  # ---- Lab 8: monitoring stack ----
  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    depends_on:
      quicknotes:
        condition: service_healthy        # Lab 6 healthcheck pays off here
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-quicknotes-lab8}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  quicknotes-data:
  grafana-data:
