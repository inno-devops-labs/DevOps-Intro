services:
  quicknotes:
    build:
      context: ./app
    image: quicknotes:lab6
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_PATH: /data/notes.json
      SEED_PATH: /seed.json
    volumes:
      - quicknotes-data:/data
    restart: unless-stopped

    # --- Hardening: the 6 security defaults (Lecture 6) ---
    read_only: true            # 4. read-only root filesystem
    tmpfs:
      - /tmp                   #    ...with a writable tmpfs (the /data volume stays writable)
    cap_drop:
      - ALL                    # 3. drop every Linux capability (QuickNotes needs none)
    security_opt:
      - no-new-privileges:true # 5. block setuid privilege escalation
    # (1) USER nonroot and (2) distroless base come from app/Dockerfile.
    # (6) Trivy scan documented in submissions/lab6.md.

    healthcheck:
      # Distroless has no shell/curl — re-invoke the app binary's healthcheck mode.
      test: ["CMD", "/quicknotes", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # --- Monitoring stack (Lab 8) ---
  prometheus:
    image: prom/prometheus:v3.5.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      quicknotes:
        condition: service_healthy   # Lab 6 healthcheck gates the scrape target
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # No default admin/admin — set GF_ADMIN_PASSWORD in your env; local fallback below.
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-quicknotes-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  quicknotes-data:
  grafana-data:
