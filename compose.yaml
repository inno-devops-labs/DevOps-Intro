services:
  quicknotes:

    build:
      context: ./app

    image: quicknotes:lab6

    ports:
      - "8080:8080"

    environment:
      ADDR: ":8080"
      DATA_PATH: "/data/notes.json"
      SEED_PATH: "/data/seed.json"

    volumes:
      - quicknotes-data:/data

    restart: unless-stopped

    healthcheck:
      disable: true
      test: ["CMD", "/quicknotes", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3


volumes:
  quicknotes-data: