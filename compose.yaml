services:
  quicknotes:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: quicknotes:lab6
    container_name: quicknotes-app
    ports:
      - "8080:8080"
    volumes:
      - ./app/data:/data
    environment:
      - ADDR=:8080
      - DATA_PATH=/data/notes.json
      - SEED_PATH=/data/seed.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/quicknotes", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add: []
    security_opt:
      - no-new-privileges:true
    user: "65532:65532"

volumes:
  quicknotes-data:
    name: quicknotes-data
