services:
  init-volume:
    image: alpine
    user: "root"
    volumes:
      - quicknotes-data:/data
    command: chown -R 65532:65532 /data

  quicknotes:
    build:
      context: ./app
    image: quicknotes:lab6
    ports:
      - "8080:8080"
    environment:
      - ADDR=:8080
      - DATA_PATH=/data/notes.json
      - SEED_PATH=/data/seed.json
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - quicknotes-data:/data
    restart: unless-stopped
    depends_on:
      init-volume:
        condition: service_completed_successfully

    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  quicknotes-data: