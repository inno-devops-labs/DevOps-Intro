# Inventory used by ansible-pull INSIDE the VM: the VM reconciles itself.
# The host name matches the VM's hostname (Vagrantfile: config.vm.hostname),
# and ansible_connection=local means no SSH — the playbook runs against the
# machine ansible-pull is executing on.
[quicknotes_vm]
quicknotes-vm ansible_connection=local ansible_python_interpreter=/usr/bin/python3
