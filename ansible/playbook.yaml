---
- name: Deploy QuickNotes
  hosts: quicknotes_vm
  become: true
  gather_facts: false        # this play uses no facts — skip the fact round-trip

  vars:
    qn_user: quicknotes
    qn_bin: /usr/local/bin/quicknotes
    qn_data_dir: /var/lib/quicknotes
    listen_addr: ":8080"
    data_path: /var/lib/quicknotes/notes.json
    seed_path: /var/lib/quicknotes/seed.json

  handlers:
    - name: restart quicknotes
      ansible.builtin.systemd_service:
        name: quicknotes
        state: restarted
        daemon_reload: true

  tasks:
    - name: Create the quicknotes system user
      ansible.builtin.user:
        name: "{{ qn_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Ensure the data directory exists
      ansible.builtin.file:
        path: "{{ qn_data_dir }}"
        state: directory
        owner: "{{ qn_user }}"
        group: "{{ qn_user }}"
        mode: "0750"

    - name: Ship the QuickNotes binary
      ansible.builtin.copy:
        src: files/quicknotes
        dest: "{{ qn_bin }}"
        mode: "0755"
      notify: restart quicknotes

    - name: Ship the seed data
      ansible.builtin.copy:
        src: files/seed.json
        dest: "{{ seed_path }}"
        owner: "{{ qn_user }}"
        group: "{{ qn_user }}"
        mode: "0644"

    - name: Render the systemd unit
      ansible.builtin.template:
        src: templates/quicknotes.service.j2
        dest: /etc/systemd/system/quicknotes.service
        mode: "0644"
      notify: restart quicknotes

    - name: Enable and start QuickNotes
      ansible.builtin.systemd_service:
        name: quicknotes
        enabled: true
        state: started
        daemon_reload: true
