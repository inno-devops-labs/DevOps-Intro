- name: Install and run QuickNotes
  hosts: quicknotes-vm
  become: yes
  gather_facts: false

  vars:
    quicknotes_directory: /var/lib/quicknotes
    listen_addr: ":8080"
    data_path: /var/lib/quicknotes/data.json
    seed_path: /var/lib/quicknotes/seed.json

  tasks:
    - name: Create system user
      user:
        name: quicknotes
        system: true
        shell: /usr/sbin/nologin
    
    - name: Configure QuickNotes data directory
      file:
        path: /var/lib/quicknotes
        state: directory
        owner: quicknotes
        group: quicknotes
        mode: "0750"

    - name: Copy QuickNotes binary
      copy:
        src: files/quicknotes
        dest: /usr/local/bin/quicknotes
        mode: "0755"
        owner: root
        group: root
      notify: Restart QuickNotes
      
    - name: Render QuickNotes systemd unit
      template:
        src: ./templates/quicknotes.service.j2
        dest: /etc/systemd/system/quicknotes.service
      notify:
        - Reload systemd
        - Restart QuickNotes
    
    - name: Enable and start QuickNotes systemd unit
      systemd:
        name: quicknotes
        daemon_reload: yes
        enabled: yes
        state: started

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart QuickNotes
      systemd:
        name: quicknotes
        state: restarted

