---
- name: Deploy QuickNotes to VM
  hosts: quicknotes-vm
  become: true
  gather_facts: true

  vars:
    listen_addr: ":9090"
    data_path: "/var/lib/quicknotes/data.json"
    seed_path: "/var/lib/quicknotes/seed.json"
    quicknotes_user: quicknotes
    quicknotes_group: quicknotes
    binary_path: /usr/local/bin/quicknotes
    service_name: quicknotes

  tasks:
    - name: Create system user
      ansible.builtin.user:
        name: "{{ quicknotes_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Ensure data directory exists
      ansible.builtin.file:
        path: /var/lib/quicknotes
        state: directory
        owner: "{{ quicknotes_user }}"
        group: "{{ quicknotes_group }}"
        mode: '0750'

    - name: Copy QuickNotes binary
      ansible.builtin.copy:
        src: files/quicknotes
        dest: "{{ binary_path }}"
        mode: '0755'
      notify: restart quicknotes

    - name: Render systemd unit
      ansible.builtin.template:
        src: templates/quicknotes.service.j2
        dest: /etc/systemd/system/{{ service_name }}.service
        mode: '0644'
      notify: restart quicknotes

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started

  handlers:
    - name: restart quicknotes
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
        daemon_reload: true
