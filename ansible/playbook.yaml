---
# Deploys QuickNotes to the Lab 5 VM as a systemd service, idempotently.
- name: Deploy QuickNotes
  hosts: quicknotes
  become: true
  gather_facts: false          # (d) we use no facts here, so skip the fact-gathering round-trip
  vars:
    qn_user: quicknotes
    qn_bin_dest: /usr/local/bin/quicknotes
    qn_data_dir: /var/lib/quicknotes
    listen_addr: ":8085"
    data_path: "/var/lib/quicknotes/notes.json"
    seed_path: "/var/lib/quicknotes/seed.json"

  tasks:
    - name: Create the quicknotes system user
      ansible.builtin.user:
        name: "{{ qn_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Ensure the data directory exists
      ansible.builtin.file:
        path: "{{ qn_data_dir }}"
        state: directory
        owner: "{{ qn_user }}"
        group: "{{ qn_user }}"
        mode: "0750"

    - name: Install the QuickNotes binary
      ansible.builtin.copy:
        src: files/quicknotes
        dest: "{{ qn_bin_dest }}"
        mode: "0755"
      notify: restart quicknotes

    - name: Render the systemd unit from template
      ansible.builtin.template:
        src: templates/quicknotes.service.j2
        dest: /etc/systemd/system/quicknotes.service
        mode: "0644"
      notify: restart quicknotes

    - name: Reload systemd, enable and start the service
      ansible.builtin.systemd:
        name: quicknotes
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    # Fires only when the binary or the unit file actually changed.
    - name: restart quicknotes
      ansible.builtin.systemd:
        name: quicknotes
        state: restarted
        daemon_reload: true
