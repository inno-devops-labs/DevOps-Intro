---
- name: Deploy QuickNotes
  hosts: quicknotes_vm
  become: true
  gather_facts: false

  vars:
    quicknotes_user: quicknotes
    quicknotes_group: quicknotes
    quicknotes_data_dir: /var/lib/quicknotes
    quicknotes_binary_path: /usr/local/bin/quicknotes
    quicknotes_listen_addr: ":8080"
    quicknotes_data_path: /var/lib/quicknotes/notes.json
    quicknotes_seed_path: /var/lib/quicknotes/seed.json
    quicknotes_restart_sec: 3s

    quicknotes_ansible_pull_enabled: false
    quicknotes_ansible_pull_repo_url: "https://github.com/whynotgm/DevOps-Intro.git"
    quicknotes_ansible_pull_branch: "feature/lab7"
    quicknotes_ansible_pull_inventory_path: /etc/ansible/quicknotes-local.ini
    quicknotes_ansible_pull_workdir: /opt/quicknotes-ansible-pull

  tasks:
    - name: Create QuickNotes system group
      ansible.builtin.group:
        name: "{{ quicknotes_group }}"
        system: true

    - name: Create QuickNotes system user
      ansible.builtin.user:
        name: "{{ quicknotes_user }}"
        group: "{{ quicknotes_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ quicknotes_data_dir }}"
        create_home: false

    - name: Ensure QuickNotes data directory exists
      ansible.builtin.file:
        path: "{{ quicknotes_data_dir }}"
        state: directory
        owner: "{{ quicknotes_user }}"
        group: "{{ quicknotes_group }}"
        mode: "0750"

    - name: Install QuickNotes seed data
      ansible.builtin.copy:
        src: files/seed.json
        dest: "{{ quicknotes_seed_path }}"
        owner: "{{ quicknotes_user }}"
        group: "{{ quicknotes_group }}"
        mode: "0640"

    - name: Install QuickNotes binary
      ansible.builtin.copy:
        src: files/quicknotes
        dest: "{{ quicknotes_binary_path }}"
        owner: root
        group: root
        mode: "0755"
      notify: restart quicknotes

    - name: Install QuickNotes systemd unit
      ansible.builtin.template:
        src: templates/quicknotes.service.j2
        dest: /etc/systemd/system/quicknotes.service
        owner: root
        group: root
        mode: "0644"
      notify: restart quicknotes

    - name: Enable and start QuickNotes
      ansible.builtin.systemd:
        name: quicknotes
        enabled: true
        state: started
        daemon_reload: true

    - name: Install packages required for ansible-pull
      ansible.builtin.apt:
        name:
          - ansible
          - git
        state: present
        update_cache: true
      when: quicknotes_ansible_pull_enabled | bool

    - name: Ensure Ansible configuration directory exists
      ansible.builtin.file:
        path: /etc/ansible
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: quicknotes_ansible_pull_enabled | bool

    - name: Install local inventory for ansible-pull
      ansible.builtin.copy:
        dest: "{{ quicknotes_ansible_pull_inventory_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [quicknotes_vm]
          localhost ansible_connection=local
      when: quicknotes_ansible_pull_enabled | bool

    - name: Install ansible-pull service
      ansible.builtin.template:
        src: templates/ansible-pull-quicknotes.service.j2
        dest: /etc/systemd/system/ansible-pull-quicknotes.service
        owner: root
        group: root
        mode: "0644"
      when: quicknotes_ansible_pull_enabled | bool

    - name: Install ansible-pull timer
      ansible.builtin.template:
        src: templates/ansible-pull-quicknotes.timer.j2
        dest: /etc/systemd/system/ansible-pull-quicknotes.timer
        owner: root
        group: root
        mode: "0644"
      when: quicknotes_ansible_pull_enabled | bool

    - name: Enable and start ansible-pull timer
      ansible.builtin.systemd:
        name: ansible-pull-quicknotes.timer
        enabled: true
        state: started
        daemon_reload: true
      when: quicknotes_ansible_pull_enabled | bool

  handlers:
    - name: restart quicknotes
      ansible.builtin.systemd:
        name: quicknotes
        state: restarted
        daemon_reload: true
