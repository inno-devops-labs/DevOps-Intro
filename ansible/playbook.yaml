---
- name: Deploy QuickNotes to Lab 5 VM
  hosts: quicknotes-vm
  become: true
  gather_facts: false

  vars:
    listen_addr: ":9090"
    data_path: "/var/lib/quicknotes/data.json"
    seed_path: "/var/lib/quicknotes/seed.json"
    binary_path: "/usr/local/bin/quicknotes"
    data_dir: "/var/lib/quicknotes"
    user: "quicknotes"
    group: "quicknotes"

  tasks:
    - name: Create system user quicknotes
      ansible.builtin.user:
        name: "{{ user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        state: present

    - name: Ensure data directory exists
      ansible.builtin.file:
        path: "{{ data_dir }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: '0750'

    - name: Copy QuickNotes binary
      ansible.builtin.copy:
        src: files/quicknotes
        dest: "{{ binary_path }}"
        mode: '0755'
        owner: root
        group: root
      notify: restart quicknotes

    - name: Render systemd unit file
      ansible.builtin.template:
        src: templates/quicknotes.service.j2
        dest: /etc/systemd/system/quicknotes.service
        mode: '0644'
        owner: root
        group: root
      notify: restart quicknotes

    - name: Reload systemd and start service
      ansible.builtin.systemd:
        daemon_reload: true
        name: quicknotes
        state: started
        enabled: true

  handlers:
    - name: restart quicknotes
      ansible.builtin.systemd:
        name: quicknotes
        state: restarted
        daemon_reload: true
