# Local model: the VM reconciles itself (ansible_connection=local).
# Used because this Windows host can't be an Ansible control node (and WSL needs
# Hyper-V, which conflicts with the VirtualBox VM). It is also exactly what the
# Bonus ansible-pull loop uses. Run inside the VM from /vagrant/ansible:
#   ansible-playbook -i inventory-local.ini playbook.yaml
[quicknotes]
localhost ansible_connection=local
