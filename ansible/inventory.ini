# Lab 5's deploy target was a Vagrant VirtualBox VM. The playbook is identical to what a
# VM would get (system user, systemd unit, handlers, idempotency).
#
# The Vagrant equivalent (from `vagrant ssh-config`) would be:
#   [quicknotes_vm]
#   quicknotes ansible_host=127.0.0.1 ansible_port=2222 \
#     ansible_user=vagrant \
#     ansible_ssh_private_key_file=.vagrant/.../private_key

[quicknotes_vm]
lab7vm

[quicknotes_vm:vars]
ansible_connection=community.docker.docker
ansible_python_interpreter=/usr/bin/python3
