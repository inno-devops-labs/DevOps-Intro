; Lab 5 VM is on the libvirt default network (virbr0, 192.168.122.0/24).
; Vagrant generates per-machine SSH keys under .vagrant/; reuse the same key.
; ansible_host is the DHCP-assigned IP from `virsh net-dhcp-leases default`.

[lab5]
quicknotes-vm ansible_host=192.168.122.77

[lab5:vars]
ansible_user=vagrant
ansible_port=22
ansible_ssh_private_key_file=/home/karim/Dev/DevOps-Intro/.vagrant/machines/default/libvirt/private_key
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
