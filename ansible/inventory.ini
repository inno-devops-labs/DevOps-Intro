# Connect to the Lab 5 Vagrant VM. Confirm these values with:
#   cd <repo root> && vagrant ssh-config
# (host/port/key can differ; port is often 2222, key is under .vagrant/).
[quicknotes]
quicknotes-vm ansible_host=127.0.0.1 ansible_port=2222

[quicknotes:vars]
ansible_user=vagrant
ansible_ssh_private_key_file=../.vagrant/machines/default/virtualbox/private_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
