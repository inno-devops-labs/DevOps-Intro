# Push model: a control node SSHes into the Lab 5 Vagrant VM.
# Values come straight from `vagrant ssh-config` (host port 2222, vagrant user,
# the Vagrant-generated key). Run from the repo root:
#   ansible-playbook -i ansible/inventory.ini ansible/playbook.yaml
[quicknotes]
quicknotes-vm ansible_host=127.0.0.1 ansible_port=2222 ansible_user=vagrant

[quicknotes:vars]
ansible_ssh_private_key_file=.vagrant/machines/default/virtualbox/private_key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
