stages: [info, system]

basic_info:
  stage: info
  image: alpine:3.19
  script:
    - echo "Pipeline source: $CI_PIPELINE_SOURCE"
    - echo "Branch: $CI_COMMIT_BRANCH"
    - echo "Commit: $CI_COMMIT_SHA"
    - date
    - pwd
    - ls -la

system_info_manual:
  stage: system
  image: alpine:3.19
  when: manual
  allow_failure: true
  script:
    - uname -a || true
    - nproc || true
    - free -h || true
    - df -h || true
