spin_manifest_version = 2

[application]
name = "moscow-time"
version = "0.1.0"
authors = ["Muhammadjon Aslonov"]
description = "Moscow-time HTTP endpoint as a WebAssembly component (Spin)."

[[trigger.http]]
route = "/time"
component = "moscow-time"

[component.moscow-time]
source = "main.wasm"
# Capability-based security: no outbound network access is granted.
allowed_outbound_hosts = []

[component.moscow-time.build]
command = "tinygo build -target=wasip1 -gc=leaking -buildmode=c-shared -o main.wasm ."
watch = ["**/*.go", "go.mod"]
