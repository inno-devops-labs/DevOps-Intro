groups:
  - name: quicknotes
    rules:
      # Symptom alert: error ratio above 5% sustained for 5 minutes.
      # The 5m `for:` keeps a single 4xx burst from paging anyone.
      - alert: HighErrorRate
        expr: |
          sum(rate(quicknotes_http_responses_by_code_total{code=~"4..|5.."}[5m]))
          /
          sum(rate(quicknotes_http_responses_by_code_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "QuickNotes error ratio above 5% for 5 minutes"
          description: "{{ $value | humanizePercentage }} of requests are 4xx/5xx."
          runbook: "docs/runbook/high-error-rate.md"
