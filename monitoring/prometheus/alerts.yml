groups:
  - name: quicknotes-golden-signals
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(quicknotes_http_responses_by_code_total{code=~"4..|5.."}[5m]))
          /
          clamp_min(sum(rate(quicknotes_http_responses_by_code_total[5m])), 1e-9)
          > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "QuickNotes error ratio above 5% for 5 minutes"
          runbook_url: "docs/runbook/high-error-rate.md"