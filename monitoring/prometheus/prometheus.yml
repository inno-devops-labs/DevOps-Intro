global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # One job for QuickNotes. Target it by its Compose service name; Compose DNS
  # resolves "quicknotes" to the container inside the shared network.
  - job_name: quicknotes
    metrics_path: /metrics
    static_configs:
      - targets: ["quicknotes:8080"]
