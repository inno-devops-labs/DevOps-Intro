# monitoring/prometheus/prometheus.yml
global:
  scrape_interval: 15s          # Task 1.2.1 — default cadence
  evaluation_interval: 15s      # how often alert rules are evaluated

rule_files:
  - /etc/prometheus/rules/*.yml # Task 2 — alert rule lives here

scrape_configs:
  - job_name: quicknotes        # Task 1.2.2 — exactly one scrape job
    metrics_path: /metrics
    static_configs:
      # Task 1.2.3 — Compose DNS resolves "quicknotes" inside the network.
      # Port 8080 is what the binary LISTENS on in the container, NOT a
      # published host port. This is the #1 "up == 0" pitfall.
      - targets: ["quicknotes:8080"]
