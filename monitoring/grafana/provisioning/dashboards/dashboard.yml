apiVersion: 1

providers:
  - name: QuickNotes
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Mounted JSON dashboards live here (see compose volume mount).
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
