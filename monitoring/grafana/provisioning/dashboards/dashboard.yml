# Dashboard *provider*: tells Grafana to load any dashboard JSON it finds under
# the mounted path on startup (and re-scan every 30s). The `path` here MUST match
# where compose.yaml mounts the JSON inside the container
# (./monitoring/grafana/dashboards -> /var/lib/grafana/dashboards).

apiVersion: 1

providers:
  - name: golden-signals
    orgId: 1
    folder: "" # land dashboards in the General folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
