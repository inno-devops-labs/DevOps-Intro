apiVersion: 1

providers:
  - name: golden-signals
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Grafana loads any dashboard JSON found here on startup. Must match where
      # compose mounts the dashboards directory.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
