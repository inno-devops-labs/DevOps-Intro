name: Lab3 - GitHub Actions

on:
  push:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Print basic info
        run: |
          echo "event: ${{ github.event_name }}"
          echo "repo:  ${{ github.repository }}"
          echo "ref:   ${{ github.ref }}"
          echo "sha:   ${{ github.sha }}"
          echo "actor: ${{ github.actor }}"
      - name: Gather runner system info
        run: |
          echo "uname:"
          uname -a
          echo ""
          echo "os release:"
          cat /etc/os-release || true
          echo ""
          echo "cpu:"
          nproc
          lscpu || true
          echo ""
          echo "memory:"
          free -h || true
          echo ""
          echo "disk:"
          df -h

