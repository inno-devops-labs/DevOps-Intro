name: Release

on:
  push:
    tags: ['v*']

# The workflow only needs to read the repo and push the image package.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # QEMU lets buildx produce the arm64 variant on the amd64 runner. Both
      # platforms matter here: Hugging Face Spaces pulls linux/amd64, the
      # Apple Silicon laptop pulls linux/arm64.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags the immutable version (the git tag that triggered the run) plus
      # the moving latest pointer. ghcr requires a lowercase image path.
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dekart-hub/devops-intro/quicknotes:${{ github.ref_name }}
            ghcr.io/dekart-hub/devops-intro/quicknotes:latest
