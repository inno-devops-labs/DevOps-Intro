name: nix-repro

# Prove the Nix image build is reproducible: two independent runners build it,
# a third job asserts their digests match. (Lab 11 bonus.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-a:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix build .#docker
      - run: sha256sum result | tee digest.txt
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with: { name: digest-a, path: digest.txt }

  build-b:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix build .#docker
      - run: sha256sum result | tee digest.txt
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with: { name: digest-b, path: digest.txt }

  compare:
    needs: [build-a, build-b]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with: { name: digest-a, path: a }
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with: { name: digest-b, path: b }
      - name: Assert identical digests
        run: |
          da=$(awk '{print $1}' a/digest.txt)
          db=$(awk '{print $1}' b/digest.txt)
          echo "A=$da"; echo "B=$db"
          [ "$da" = "$db" ] && echo "reproducible ✅" || { echo "digests differ ❌"; exit 1; }
