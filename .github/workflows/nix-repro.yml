name: nix-repro

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  NIX_CONFIG: experimental-features = nix-command flakes

jobs:
  build-a:
    name: build-a
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.digest.outputs.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - run: nix build .#docker
      - id: digest
        run: echo "sha=$(sha256sum result | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  build-b:
    name: build-b
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.digest.outputs.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - run: nix build .#docker
      - id: digest
        run: echo "sha=$(sha256sum result | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  compare:
    name: compare
    runs-on: ubuntu-24.04
    needs:
      - build-a
      - build-b
    steps:
      - run: |
          echo "build-a=${{ needs.build-a.outputs.digest }}"
          echo "build-b=${{ needs.build-b.outputs.digest }}"
          if [ "${{ needs.build-a.outputs.digest }}" != "${{ needs.build-b.outputs.digest }}" ]; then
            echo "Digest mismatch"
            exit 1
          fi
