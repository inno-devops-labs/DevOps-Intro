name: nix-repro


on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-a:
    name: nix build (runner A)
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: cachix/install-nix-action@7e1d5bdb99afadeb0885b07e3913a4240e12ede5 # v31
      # - run: echo "// diverge" >> app/main.go
      - run: nix build --extra-experimental-features "nix-command flakes" .#docker
      - id: digest
        run: echo "digest=$(sha256sum result | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  build-b:
    name: nix build (runner B)
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: cachix/install-nix-action@7e1d5bdb99afadeb0885b07e3913a4240e12ede5 # v31
      - run: nix build --extra-experimental-features "nix-command flakes" .#docker
      - id: digest
        run: echo "digest=$(sha256sum result | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  compare:
    name: digests must match
    runs-on: ubuntu-24.04
    needs: [build-a, build-b]
    steps:
      - name: Compare
        run: |
          echo "A: ${{ needs.build-a.outputs.digest }}"
          echo "B: ${{ needs.build-b.outputs.digest }}"
          test -n "${{ needs.build-a.outputs.digest }}"
          test "${{ needs.build-a.outputs.digest }}" = "${{ needs.build-b.outputs.digest }}"
