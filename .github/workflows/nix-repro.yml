name: Nix Reproducibility

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: build-${{ matrix.replica }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        replica: [a, b]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c

      - name: Build Nix Docker image
        run: nix build .#docker --print-build-logs

      - name: Compute digest
        shell: bash
        run: |
          set -euo pipefail
          digest="$(sha256sum result | awk '{print $1}')"
          cp --dereference result "quicknotes-nix-${{ matrix.replica }}.tar.gz"
          echo "${digest}" > "digest-${{ matrix.replica }}.txt"
          echo "digest=${digest}" >> "${GITHUB_STEP_SUMMARY}"
          ls -lh "quicknotes-nix-${{ matrix.replica }}.tar.gz" "digest-${{ matrix.replica }}.txt"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nix-build-${{ matrix.replica }}
          path: |
            digest-${{ matrix.replica }}.txt
            quicknotes-nix-${{ matrix.replica }}.tar.gz

  compare:
    name: compare-digests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: digests

      - name: Compare digests
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloaded digests:"
          find digests -type f -name 'digest-*.txt' -print -exec cat {} \;
          a="$(cat digests/nix-build-a/digest-a.txt)"
          b="$(cat digests/nix-build-b/digest-b.txt)"
          echo "a=${a}"
          echo "b=${b}"
          test "${a}" = "${b}"
