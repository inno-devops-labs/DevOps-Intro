name: Lab 3 CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  system-info-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Starting the Lab 3 pipeline..."

      - name: Gather System Info
        run: |
          echo "--- OS Info ---"
          cat /etc/os-release
          echo "--- Kernel ---"
          uname -a
          echo "--- CPU Info ---"
          lscpu
          echo "--- Memory Info ---"
          free -h
