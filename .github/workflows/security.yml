name: security

# Standalone Go vulnerability gate (Lab 9 bonus). Runs on the same triggers as
# the Lab 3 pipeline; require this check in branch protection to block merges.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/security.yml'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'                 # aligned with the Lab 3 pipeline
          cache-dependency-path: |
            app/go.sum
            app/go.mod
      - name: Install govulncheck (pinned, not @latest)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Run govulncheck
        run: govulncheck ./...
