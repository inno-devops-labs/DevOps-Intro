name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/**'

permissions:
  contents: read

# Bonus opt #1 — cancel in-flight runs on the same ref when a new commit
# arrives. Saves wasted CI minutes when force-pushing or iterating.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Bonus opt #2 — skip VCS metadata embedding. Meaningful only for release
# builds; for CI it's pure overhead on every `go` invocation.
env:
  GOFLAGS: -buildvcs=false

jobs:
  vet:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: app/go.mod
          # Bonus opt #3 — skip the GitHub API call that resolves the latest
          # patch release. The pinned go-version is already specific enough.
          check-latest: false
      - name: go vet
        working-directory: app
        run: go vet ./...

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: app/go.mod
          check-latest: false
      - name: go test
        working-directory: app
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: app/go.mod
          check-latest: false
      - uses: golangci/golangci-lint-action@25e2cdc5eb1d7a04fdc45ff538f1a00e960ae128  # v8.0.0
        with:
          version: v2.5.0
          working-directory: app

  ci-ok:
    if: always()
    needs: [vet, test, lint]
    runs-on: ubuntu-24.04
    steps:
      - name: aggregate
        run: |
          test "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "false"
