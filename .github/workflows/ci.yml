name: quicknotes-ci

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/ci.yml
  pull_request:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/ci.yml

permissions:
  contents: read

env:
  CGO_ENABLED: "1"
  GOFLAGS: -buildvcs=false

defaults:
  run:
    shell: bash

jobs:
  vet:
    name: vet (go ${{ matrix.go-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - 1.23.x
          - 1.24.x
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: |
            app/go.sum
            app/go.mod

      - name: Run go vet
        working-directory: app
        run: go vet ./...

  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - 1.23.x
          - 1.24.x
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: |
            app/go.sum
            app/go.mod

      - name: Run race tests
        working-directory: app
        run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 1.24.x
          cache: true
          cache-dependency-path: |
            app/go.sum
            app/go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@25e2cdc5eb1d7a04fdc45ff538f1a00e960ae128 # v8.0.0
        with:
          version: v2.5.0
          working-directory: app
          args: --timeout=2m
