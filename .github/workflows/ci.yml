name: PR Gate

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read   # минимальные права

jobs:
  # ---------- vet ----------
  vet:
    name: go vet
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: [ '1.23', '1.24' ]
      fail-fast: false
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.3.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Run go vet
        run: go vet ./...

  # ---------- test ----------
  test:
    name: go test -race
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: [ '1.23', '1.24' ]
      fail-fast: false
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.3.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Run tests with race detector
        run: go test -race -count=1 ./...

  # ---------- lint ----------
  lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.3.0
        with:
          go-version: '1.24'      # достаточно одной версии для линтера
          cache: true
      - name: Install golangci-lint v2.5.0
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | \
            sh -s -- -b $(go env GOPATH)/bin v2.5.0
      - name: Run golangci-lint
        run: golangci-lint run ./...