name: ci

on:
  push:
    branches:
      - main

    paths:
      - 'app/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - main

    paths:
      - 'app/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  vet:
    name: vet (${{ matrix.go-version }})

    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false

      matrix:
        go-version:
          - '1.23'
          - '1.24'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run go vet
        working-directory: app
        run: go vet ./...

  test:
    name: test (${{ matrix.go-version }})

    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false

      matrix:
        go-version:
          - '1.23'
          - '1.24'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests
        working-directory: app
        run: go test -race -count=1 ./...

  lint:
    name: lint

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.24'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: v2.5.0
          working-directory: app
