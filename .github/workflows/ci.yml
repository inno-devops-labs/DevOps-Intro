name: CI

# PR gate: vet + test + lint must pass before merge.
# Triggers on pushes to main and PRs targeting main, but only when code or the
# pipeline itself changes — docs-only changes skip CI (Task 2.3).
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'

# Least privilege: the gate only needs to read the repo contents.
permissions:
  contents: read

# Bonus opt: cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Bonus opt: skip VCS stamping; also avoids needing full git history.
env:
  GOFLAGS: -buildvcs=false

jobs:
  vet:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false # see all failing cells, don't cancel siblings
      matrix:
        go: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: ${{ matrix.go }}
          cache: false # Bonus: build cache removed — net-negative on a zero-dep module
      - name: go vet
        working-directory: app
        run: go vet ./...

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: ${{ matrix.go }}
          cache: false # Bonus: build cache removed — net-negative on a zero-dep module
      - name: go test -race
        working-directory: app
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'
          cache: false # golangci-lint-action manages its own cache
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.5.0 # pinned exactly — config in app/.golangci.yml is v2 format
          working-directory: app
