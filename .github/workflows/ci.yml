name: CI Quickstart

on:
  push:
    branches:
      - feature/lab3
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print basic info
        run: |
          echo "Hello from GitHub Actions!"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          date

      - name: System information
        run: |
          echo "OS:"
          uname -a
          echo ""
          echo "CPU cores:"
          nproc
          echo ""
          echo "Memory:"
          free -h
          echo ""
          echo "Disk:"
          df -h