name: CI

# Task 1 — PR gate: vet + test + lint must pass before merge.
# Triggers on pushes to main and on every PR targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the gate only needs to read the repo contents.
permissions:
  contents: read

jobs:
  vet:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'
          cache: false # baseline: no cache (Task 2 turns this on)
      - name: go vet
        working-directory: app
        run: go vet ./...

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'
          cache: false # baseline: no cache (Task 2 turns this on)
      - name: go test -race
        working-directory: app
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'
          cache: false # baseline: no cache (Task 2 turns this on)
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.5.0 # pinned exactly — config in app/.golangci.yml is v2 format
          working-directory: app
