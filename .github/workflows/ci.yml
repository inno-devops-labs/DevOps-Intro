name: QuickNotes CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  vet:
    strategy:
      fail-fast: false
      matrix:
        version: ['1.23', '1.24']
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ matrix.version }}
          check-latest: false
      - run: go vet ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        version: ['1.23', '1.24']
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ matrix.version }}
          check-latest: false
      - run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.24'
          check-latest: false
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          working-directory: ./app
